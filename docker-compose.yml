version: "3.9"

services:
  php:
    image: laravel-app:latest  # ✅ use Jenkins-built image
    container_name: php_app
    volumes:
      - ./app:/var/www/html
    networks:
      - app-network
    depends_on:
      - postgres

  nginx:
    image: nginx:latest
    container_name: nginx_server1
    ports:
      - "8081:80"
    volumes:
      - ./app:/var/www/html
      - ./ngnix/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app-network

  postgres:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_DB: drupal
      POSTGRES_USER: drupal
      POSTGRES_PASSWORD: drupal123
    networks:
      - app-network

networks:
  app-network:
